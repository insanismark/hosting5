# VSFTPD Configuration Template
# Copy to /etc/vsftpd.conf and customize

# Run in standalone mode
listen=YES
listen_ipv6=NO

# Enable anonymous FTP (disabled for security)
anonymous_enable=NO

# Allow local users
local_enable=YES

# Enable FTP write commands
write_enable=YES

# Local umask for files
local_umask=022

# Show directory messages
dirmessage_enable=YES

# Enable log
xferlog_enable=YES
xferlog_file=/var/log/vsftpd.log
xferlog_std_format=YES

# Connect timeout
connect_from_port_20=YES

# Chroot users to their home directory
chroot_local_user=YES
allow_writeable_chroot=YES

# Secure chroot
seccomp_sandbox=NO

# Passive mode configuration
pasv_enable=Yes
pasv_min_port=21000
pasv_max_port=21000
pasv_address=YOUR_SERVER_IP

# RSA certificate
rsa_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
rsa_private_key_file=/etc/ssl/private/ssl-cert-snakeoil.key
ssl_enable=NO

# User configuration directory
user_config_dir=/etc/vsftpd/user_conf

# PAM service name
pam_service_name=vsftpd

# Force local users
force_local_data_ssl=NO
force_local_logins_ssl=NO

# ASCII mangling
ascii_upload_enable=YES
ascii_download_enable=YES

# LS recursion (prevent directory traversal)
ls_recurse_enable=YES

# Logging
dual_log_enable=YES
log_ftp_protocol=YES

